name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
  DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
  JWT_SECRET: "ci-test-secret-not-for-production-minimum-32-chars"
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key-for-ci-build"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/db
          - packages/auth
          - packages/shared
          - apps/backoffice
          - apps/loyalty
          - apps/staff
          - apps/order
          - apps/pos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace ${{ matrix.workspace }} --if-present

  build:
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    strategy:
      fail-fast: false
      matrix:
        app: [backoffice, loyalty, pos, order, staff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace apps/${{ matrix.app }}
