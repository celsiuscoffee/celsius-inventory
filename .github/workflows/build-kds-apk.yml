name: Build KDS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create empty web assets dir
        run: mkdir -p apps/order/out && echo "<html></html>" > apps/order/out/index.html

      - name: Build APK
        working-directory: apps/order/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: celsius-orders-kds
          path: apps/order/android/app/build/outputs/apk/debug/app-debug.apk
